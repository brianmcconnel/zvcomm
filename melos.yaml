name: zvcomm
repository: https://github.com/brianmcconnel/zvcomm

# Package discovery for optional melos scripts. Dependency resolution uses
# Dart pub workspaces (root pubspec.yaml `workspace:` + `resolution: workspace`).
# Do NOT run `melos bootstrap` — it generates pubspec_overrides.yaml that conflict
# with workspace packages ("Cannot override workspace packages").
packages:
  - packages/**
  - apps/**

scripts:
  get:
    run: flutter pub get
    description: Resolve monorepo deps via pub workspace (not melos bootstrap)

  analyze:
    run: |
      dart analyze --fatal-infos packages/core packages/pki packages/sim apps/cli
      (cd packages/ble && flutter analyze --fatal-infos)
      (cd packages/nfc && flutter analyze --fatal-infos)
      (cd packages/wifi && flutter analyze --fatal-infos)
      (cd packages/ui && flutter analyze --fatal-infos)
      (cd apps/app && flutter analyze --fatal-infos)
    description: Analyze all packages

  test:
    run: |
      dart test packages/core packages/pki packages/sim apps/cli
      (cd packages/ble && flutter test)
      (cd packages/nfc && flutter test)
      (cd packages/wifi && flutter test)
      (cd packages/ui && flutter test)
      (cd apps/app && flutter test)
    description: Run all package tests

  test:core:
    run: dart test packages/core
    description: Run core package tests only

  format:
    run: dart format .
    description: Format all Dart code

  format:check:
    run: dart format --set-exit-if-changed .
    description: Check formatting

  license:check:
    run: dart run tool/license_check.dart
    description: Verify all dependencies use permissive licenses only

  static:
    run: bash scripts/static_analysis.sh
    description: Full static analysis suite (analyzer, format, license, gitleaks)
