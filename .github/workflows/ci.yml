# Fast checks: analyze, test, license. Platform binaries live in build.yml.
# Uses Dart pub workspaces (root flutter pub get). Do not run melos bootstrap —
# it writes per-package pubspec_overrides that conflict with resolution: workspace.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Workspace pub get
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze pure-Dart packages
        run: |
          dart analyze --fatal-infos packages/core
          dart analyze --fatal-infos packages/pki
          dart analyze --fatal-infos packages/sim
          dart analyze --fatal-infos apps/cli

      - name: Analyze Flutter packages
        run: |
          (cd packages/ble && flutter analyze --fatal-infos)
          (cd packages/nfc && flutter analyze --fatal-infos)
          (cd packages/wifi && flutter analyze --fatal-infos)
          (cd packages/ui && flutter analyze --fatal-infos)

      - name: Test pure-Dart packages
        run: |
          dart test packages/core
          dart test packages/pki
          dart test packages/sim
          dart test apps/cli

      - name: Test Flutter packages
        run: |
          (cd packages/ble && flutter test)
          (cd packages/nfc && flutter test)
          (cd packages/wifi && flutter test)
          (cd packages/ui && flutter test)

      - name: License gate
        run: dart run tool/license_check.dart

  flutter-app:
    name: Flutter App checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Workspace pub get
        run: flutter pub get

      - name: Analyze app
        run: cd apps/app && flutter analyze --fatal-infos

      - name: Widget tests
        run: cd apps/app && flutter test
