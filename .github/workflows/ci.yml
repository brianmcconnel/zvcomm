name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dart pub get (workspace)
        run: dart pub get

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: dart pub global run melos bootstrap

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart pub global run melos exec -- dart analyze --fatal-infos

      - name: Test pure-Dart packages
        run: |
          dart test packages/core
          dart test packages/pki
          dart test packages/sim
          dart test apps/cli

      - name: Test Flutter transport packages
        run: |
          cd packages/ble && flutter test
          cd ../../packages/nfc && flutter test
          cd ../../packages/wifi && flutter test
          cd ../../packages/ui && flutter test

      - name: License gate
        run: dart run tool/license_check.dart

  flutter-app:
    name: Flutter App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: |
          dart pub get
          cd apps/app && flutter pub get

      - name: Analyze app
        run: cd apps/app && flutter analyze

      - name: Widget tests
        run: cd apps/app && flutter test

      - name: Linux release build
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          cd apps/app && flutter build linux --release
