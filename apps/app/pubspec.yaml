name: app
description: >
  ZVComm – ultra-efficient short-range mesh chat, files, and presence over
  BLE, NFC, and Wi-Fi. Offline-first. Copyright Brian McConnel 2026.
version: 0.5.0+5
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: '>=3.22.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  core:
    path: ../../packages/core
  ble:
    path: ../../packages/ble
  nfc:
    path: ../../packages/nfc
  wifi:
    path: ../../packages/wifi
  ui:
    path: ../../packages/ui
  pki:
    path: ../../packages/pki
  # Walkie-talkie mic capture + clip playback
  record: ^6.0.0
  audioplayers: ^6.1.0
  # Chat photo picker (web + desktop + mobile)
  file_picker: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
