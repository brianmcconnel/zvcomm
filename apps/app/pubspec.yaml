name: app
description: >
  ZVComm – ultra-efficient short-range mesh chat, files, and presence over
  BLE, NFC, and Wi-Fi. Offline-first, Apache-2.0.
version: 0.5.0+5
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: '>=3.22.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  core:
    path: ../../packages/core
  ble:
    path: ../../packages/ble
  nfc:
    path: ../../packages/nfc
  wifi:
    path: ../../packages/wifi
  ui:
    path: ../../packages/ui
  pki:
    path: ../../packages/pki

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
