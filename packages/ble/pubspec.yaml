name: ble
description: Bluetooth LE transport for ZVComm (central + peripheral, MIT stack).
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: '>=3.22.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../core
  bluetooth_low_energy: ^6.2.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.25.0

flutter:
  uses-material-design: false
